// ===== STATE =====
let direction = 'en-tl';
let activeCat = 'All';
let searchQuery = '';
const TL_LANG = 'fr-HT';

function loadCustomPhrases() {
  try { return JSON.parse(localStorage.getItem('customPhrases_haitian_creole') || '[]'); }
  catch { return []; }
}
function saveCustomPhrasesToStorage(arr) {
  localStorage.setItem('customPhrases_haitian_creole', JSON.stringify(arr));
}
let CUSTOM_PHRASES = loadCustomPhrases();

function getAllPhrases() { return [...PHRASES, ...CUSTOM_PHRASES]; }
function getCategories() {
  const all = getAllPhrases();
  const cats = ['All', ...Array.from(new Set(all.map(p => p.cat)))];
  if (CUSTOM_PHRASES.length > 0 && !cats.includes('My Phrases')) cats.push('My Phrases');
  return cats;
}

function init() {
  renderCategories();
  renderPhrases();
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  document.addEventListener('touchstart', function unlock() {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(u);
    }
    document.removeEventListener('touchstart', unlock);
  }, { once: true });
}

function renderCategories() {
  const row = document.getElementById('catRow');
  row.innerHTML = getCategories().map(cat =>
    `<button class="cat-pill ${cat === activeCat ? 'active' : ''}" onclick="setCat('${cat.replace(/'/g, "\\'")}')">${cat}</button>`
  ).join('');
}

function setCat(cat) {
  activeCat = cat;
  renderCategories();
  renderPhrases();
}

function setDir(dir) {
  direction = dir;
  document.querySelectorAll('.dir-btn').forEach((b, i) =>
    b.classList.toggle('active', (i === 0 && dir === 'en-tl') || (i === 1 && dir === 'tl-en'))
  );
  renderPhrases();
}

function renderPhrases() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = document.getElementById('phraseList');
  const all = getAllPhrases();
  let filtered = all;
  if (activeCat !== 'All') filtered = filtered.filter(p => p.cat === activeCat);
  if (searchQuery) filtered = filtered.filter(p =>
    p.en.toLowerCase().includes(searchQuery) || p.tl.toLowerCase().includes(searchQuery)
  );
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No phrases found. Try a different search.</div>';
    return;
  }
  const isEnTl = direction === 'en-tl';
  list.innerHTML = filtered.map((p) => {
    const isCustom = !!p.custom;
    const primary = isEnTl ? p.en : p.tl;
    const secondary = isEnTl ? p.tl : p.en;
    const primaryFlag = isEnTl ? '🇺🇸' : '🇭🇹';
    const secondaryFlag = isEnTl ? '🇭🇹' : '🇺🇸';
    const deleteBtn = isCustom
      ? `<button class="delete-phrase" onclick="event.stopPropagation();deleteCustomPhrase('${p.id}')" title="Delete">✕</button>`
      : '';
    const customBadge = isCustom ? '<span class="custom-badge">MY PHRASE</span>' : '';
    return `
      <div class="phrase-card" style="position:relative;" onclick="speakPhraseText('${secondary.replace(/'/g, "\\'")}', '${isEnTl ? TL_LANG : 'en-US'}')">
        ${deleteBtn}
        <div class="phrase-tag">${p.cat}${customBadge}</div>
        <div class="phrase-en">${primaryFlag} ${primary}</div>
        <div class="phrase-es"><span class="speak-icon">🔊</span>${secondaryFlag} ${secondary}</div>
      </div>`;
  }).join('');
}

function speakPhraseText(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.rate = 0.85;
    utter.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find(v => v.lang === lang) ||
                  voices.find(v => v.lang.startsWith(lang.substring(0, 2))) ||
                  voices.find(v => v.default);
    if (match) utter.voice = match;
    utter.onstart = () => {
      document.getElementById('speakingText').textContent = text;
      document.getElementById('nowSpeaking').classList.add('show');
    };
    utter.onend = () => { document.getElementById('nowSpeaking').classList.remove('show'); };
    utter.onerror = () => { document.getElementById('nowSpeaking').classList.remove('show'); };
    window.speechSynthesis.speak(utter);
  }, 150);
}

function openAddModal() {
  document.getElementById('newEn').value = '';
  document.getElementById('newEs').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('addModal').classList.add('show');
}
function closeModal() { document.getElementById('addModal').classList.remove('show'); }
function closeModalIfOutside(e) { if (e.target === document.getElementById('addModal')) closeModal(); }
function saveCustomPhrase() {
  const en = document.getElementById('newEn').value.trim();
  const tl = document.getElementById('newEs').value.trim();
  const cat = document.getElementById('newCat').value;
  const errEl = document.getElementById('modalError');
  if (!en) { errEl.textContent = 'Please enter the English phrase.'; return; }
  if (!tl) { errEl.textContent = 'Please enter the Haitian Creole translation.'; return; }
  const newPhrase = { cat, en, tl, custom: true, id: 'c_' + Date.now() };
  CUSTOM_PHRASES.push(newPhrase);
  saveCustomPhrasesToStorage(CUSTOM_PHRASES);
  closeModal();
  activeCat = cat;
  renderCategories();
  renderPhrases();
}
function deleteCustomPhrase(id) {
  if (!confirm('Delete this phrase?')) return;
  CUSTOM_PHRASES = CUSTOM_PHRASES.filter(p => p.id !== id);
  saveCustomPhrasesToStorage(CUSTOM_PHRASES);
  renderCategories();
  renderPhrases();
}

init();
</script>
</body>
